# Pattern Stack Configuration
# Project: stack-bench

project: stack-bench

# Port offset is auto-assigned from global registry
# Override with: port_offset: 100

services:
  postgres:
    enabled: true
  redis:
    enabled: false
  minio:
    enabled: false

apps:
  backend:
    command: "uv run uvicorn organisms.api.app:app --reload"
    working_dir: "backend"
    port: 8000
  frontend:
    command: "npm run dev"
    working_dir: "frontend"
    port: 3000
