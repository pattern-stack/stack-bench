project: stack-bench
services:
  postgres:
    enabled: true
  redis:
    enabled: false
  minio:
    enabled: false
apps:
  backend:
    command: uv run uvicorn organisms.api.app:app --reload
    working_dir: app/backend
    port: 8000
  frontend:
    command: npm run dev
    working_dir: app/frontend
    port: 3000
deploy:
  platforms:
  - gcp
  state:
    backend: gcs
    bucket: stack-bench-tfstate
    prefix: terraform/state
  registry:
    type: gcr
    project: stack-bench
    region: northamerica-northeast2
  gcp:
    project_id: stack-bench
    region: northamerica-northeast2
