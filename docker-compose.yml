# Docker Compose for stack-bench
# Generated by pts init - regenerate with: pts init --force
#
# Project: stack-bench
# All names and ports configured via environment variables (see .env)

services:
  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-stack-bench}-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-stack-bench}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-stack-bench}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stack-bench} -d ${DB_NAME:-stack-bench}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  postgres_data:
    driver: local

networks:
  default:
    driver: bridge
