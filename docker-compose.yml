# Docker Compose for stack-bench
# Generated by pts init - regenerate with: pts init --force
#
# Project: stack-bench
# Ports are configured via environment variables (see .env)

services:
  postgres:
    image: postgres:15-alpine
    container_name: stack-bench-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-stack-bench}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-stack-bench}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - stack-bench_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stack-bench} -d ${DB_NAME:-stack-bench}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stack_bench

  adminer:
    image: adminer:latest
    container_name: stack-bench-adminer
    profiles: ['ui']
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DRIVER: pgsql
      ADMINER_DESIGN: pepa-linha
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - postgres
    networks:
      - stack_bench

volumes:
  stack-bench_postgres_data:
    driver: local

networks:
  stack_bench:
    driver: bridge
