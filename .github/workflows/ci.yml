name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  UV_VERSION: "0.8.0"
  PYTHON_VERSION: "3.12"
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  BACKEND_DIR: "app/backend"
  SRC_DIR: "src"
  TEST_DIR: "__tests__"
  COV_THRESHOLD: "80"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install dependencies
        run: |
          cd ${{ env.BACKEND_DIR }}
          uv sync

      - name: Run tests with coverage
        run: |
          cd ${{ env.BACKEND_DIR }}
          PYTHONPATH=${{ env.SRC_DIR }} uv run pytest ${{ env.TEST_DIR }}/ \
            --cov=${{ env.SRC_DIR }}/features \
            --cov=${{ env.SRC_DIR }}/molecules \
            --cov=${{ env.SRC_DIR }}/organisms \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=${{ env.COV_THRESHOLD }}

      - name: Generate coverage summary
        if: always()
        run: |
          echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cd ${{ env.BACKEND_DIR }} && PYTHONPATH=${{ env.SRC_DIR }} uv run coverage report >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install dependencies
        run: |
          cd ${{ env.BACKEND_DIR }}
          uv sync

      - name: Run ruff linter
        run: cd ${{ env.BACKEND_DIR }} && uv run ruff check .

      - name: Run ruff formatter
        run: cd ${{ env.BACKEND_DIR }} && uv run ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install dependencies
        run: |
          cd ${{ env.BACKEND_DIR }}
          uv sync

      - name: Run mypy
        run: |
          cd ${{ env.BACKEND_DIR }}
          PYTHONPATH=${{ env.SRC_DIR }} uv run mypy \
            ${{ env.SRC_DIR }}/features \
            ${{ env.SRC_DIR }}/molecules \
            ${{ env.SRC_DIR }}/organisms

  ci-gate:
    name: CI Gate
    needs: [test, lint, type-check]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" || \
                "${{ needs.lint.result }}" != "success" || \
                "${{ needs.type-check.result }}" != "success" ]]; then
            echo "CI failed:"
            echo "  Test: ${{ needs.test.result }}"
            echo "  Lint: ${{ needs.lint.result }}"
            echo "  Type Check: ${{ needs.type-check.result }}"
            exit 1
          fi
          echo "All CI checks passed."
