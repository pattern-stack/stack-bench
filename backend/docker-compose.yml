services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stackbench
      POSTGRES_USER: stackbench
      POSTGRES_PASSWORD: stackbench
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stackbench"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
